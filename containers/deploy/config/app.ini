APP_NAME = Corp Deployment Server
RUN_USER = git
RUN_MODE = prod

[server]
HTTP_PORT                      = 3000
ROOT_URL                       = http://localhost:3000/
DOMAIN                         = localhost
DISABLE_SSH                    = true
SSH_CREATE_AUTHORIZED_KEYS_FILE = false

[database]
DB_TYPE = sqlite3
PATH    = /var/lib/gitea/data/gitea.db

[repository]
ROOT = /var/lib/gitea/repositories

[security]
INSTALL_LOCK      = true
SECRET_KEY        = changethis
INTERNAL_TOKEN    = changethis

[service]
DISABLE_REGISTRATION = true

[i18n]
LANGS = en-US
NAMES = English

[log]
MODE  = console
LEVEL = warn
